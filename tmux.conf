set-option -g default-terminal "tmux-256color"
set-window-option -g mode-keys vi

set-option -g prefix `
bind-key ` send-prefix

set-option -sg escape-time 10
set-option -g focus-events on
set-option -sa terminal-features ',xterm-kitty:RGB'

# Reset any lingering options from previous configs
set-option -gu status-bg
set-option -gu status-fg
set-option -g status-left ""
set-option -g status-right ""
set-option -gw window-status-format "#I:#W#F"
set-option -gw window-status-current-format "#I:#W#F"
set-option -gw window-status-current-style default
set-option -gw window-status-separator " "
set-option -gw window-status-style default
set-option -gw window-status-activity-style default
set-option -gw window-status-bell-style default
set-option -g pane-border-style default
set-option -g pane-active-border-style default
set-option -g message-style default
set-option -g message-command-style default
set-option -g mode-style default

# Color aliases
# dark_gray   #303030
# med_gray_hi #444444
# med_gray_lo #3a3a3a
# light_gray  #b2b2b2
# cyan        #80d0f0
# bright_cyan #50b0d0
# purple      #c0a0d0
# teal        #a0e0d0
# red         #e07070
# amber       #e0a020

# Nerd Font separators
#  = \uE0B4 (rounded right)
#  = \uE0B6 (rounded left)

# Status bar
set-option -g status-style "bg=#3a3a3a,fg=#b2b2b2"

# Left section: session name, purple flows from left edge (matches right side)
set-option -g status-left '#[bg=#c0a0d0]#[fg=#303030,bold] #S #[fg=#c0a0d0]#[bg=#3a3a3a] #[default]'
set-option -g status-left-length 40

# Right section: time (med gray) + host (purple to right edge)
set-option -g status-right '#[fg=#444444,bg=#3a3a3a]#[fg=#c0a0d0,bg=#444444] %H:%M #[fg=#c0a0d0,bg=#444444]#[fg=#303030,bg=#c0a0d0,bold]#h #[default]'
set-option -g status-right-length 40

# Window list
# Inactive: compact pill with invisible glyphs (no width artifacts)
set-option -g window-status-format '#[fg=#3a3a3a,bg=#3a3a3a]#[fg=#b2b2b2,bg=#3a3a3a]#I:#W#[fg=#3a3a3a,bg=#3a3a3a]#[default]'
# Active: same shape, purple pops
set-option -g window-status-current-format '#[bg=#3a3a3a,fg=#c0a0d0]#[fg=#303030,bg=#c0a0d0,bold]#I:#W#[fg=#c0a0d0,bg=#3a3a3a]#[default]'
set-option -g window-status-separator ''

# Pane borders
set-option -g pane-border-style 'fg=#444444'
set-option -g pane-active-border-style 'fg=#80d0f0'

# Messages / command line
set-option -g message-style 'bg=#303030,fg=#b2b2b2'
set-option -g message-command-style 'bg=#303030,fg=#b2b2b2'

# Copy mode / selection (purple)
set-option -g mode-style 'bg=#c0a0d0,fg=#303030'

# Clock mode
set-option -g clock-mode-colour '#e0a020'
set-option -g clock-mode-style 24

# Window activity / bell
set-option -g window-status-activity-style 'fg=#e0a020'
set-option -g window-status-bell-style 'fg=#e07070,bold'
